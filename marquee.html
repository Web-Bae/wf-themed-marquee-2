<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logo Marquee</title>

    <style>
      /* ============================================================
         LOGO MARQUEE  ·  pure CSS animation
         ------------------------------------------------------------
         Drop any number of SVGs into the .marquee__track slot below.
         Everything is driven by the CSS custom properties on .marquee
         so you can theme/tune it without touching the rest.
         ============================================================ */

      .marquee {
        /* --- tweakables --------------------------------------- */
        --marquee-speed: 80px;      /* scroll speed, px per second   */
        --marquee-gap: 4.5rem;      /* space between logos           */
        --marquee-logo-height: 40px;/* every logo is normalized to   */
        --marquee-fade: 120px;      /* width of the edge fade        */
        --marquee-direction: 1;     /* 1 = left, -1 = right          */

        /* --- internals (set by the inline script) ------------- */
        --shift: 50%;               /* distance of one loop          */

        position: relative;
        width: 100%;
        overflow: hidden;
        /* soft fade at both edges */
        -webkit-mask-image: linear-gradient(
          to right,
          transparent 0,
          #000 var(--marquee-fade),
          #000 calc(100% - var(--marquee-fade)),
          transparent 100%
        );
        mask-image: linear-gradient(
          to right,
          transparent 0,
          #000 var(--marquee-fade),
          #000 calc(100% - var(--marquee-fade)),
          transparent 100%
        );
      }

      .marquee__track {
        display: flex;
        width: max-content;
        align-items: center;
        gap: var(--marquee-gap);
        padding-block: 1.25rem;
        /* start padded so the first logo isn't flush to the edge */
        padding-inline: calc(var(--marquee-gap) / 2);
        will-change: transform;
        animation: marquee-scroll linear infinite;
        animation-duration: var(--marquee-duration, 30s);
      }

      /* each dropped SVG / img is normalized to a consistent height */
      .marquee__track > * {
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        height: var(--marquee-logo-height);
      }
      .marquee__track svg,
      .marquee__track img {
        height: 100%;
        width: auto;
        display: block;
        /* tasteful default: muted, then full color on hover */
        filter: grayscale(1);
        opacity: 0.6;
        transition: filter 0.3s ease, opacity 0.3s ease, transform 0.3s ease;
      }
      .marquee__track > *:hover svg,
      .marquee__track > *:hover img {
        filter: grayscale(0);
        opacity: 1;
        transform: translateY(-2px);
      }

      @keyframes marquee-scroll {
        from { transform: translateX(0); }
        to   { transform: translateX(calc(var(--shift) * var(--marquee-direction) * -1)); }
      }

      /* pause when the visitor hovers the strip */
      .marquee:hover .marquee__track {
        animation-play-state: paused;
      }

      /* accessibility: don't animate for reduced-motion users */
      @media (prefers-reduced-motion: reduce) {
        .marquee__track {
          animation: none;
          flex-wrap: wrap;
          justify-content: center;
        }
        .marquee {
          -webkit-mask-image: none;
          mask-image: none;
        }
      }

      /* ---- demo page chrome (delete when embedding) ---------- */
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b0d12;
        color: #e7ecf3;
        font: 500 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .demo {
        width: min(1100px, 92vw);
      }
      .demo h1 {
        font-size: 13px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #6b7686;
        text-align: center;
        margin: 0 0 1.5rem;
      }
      .demo .panel {
        background: #11141b;
        border: 1px solid #1d222c;
        border-radius: 16px;
      }
    </style>
  </head>

  <body>
    <div class="demo">
      <h1>Trusted by teams everywhere</h1>

      <div class="panel">
        <!-- ============================================================
             THE MARQUEE
             Drop your SVGs (inline <svg> or <img src="logo.svg">) into
             the .marquee__track below. Add as many or as few as you like
             the script handles cloning, sizing, and constant speed.
             ============================================================ -->
        <div class="marquee" data-marquee>
          <div class="marquee__track">
            <!-- ↓↓↓ YOUR LOGOS GO HERE ↓↓↓ -->

            <svg viewBox="0 0 120 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nimbus">
              <circle cx="16" cy="16" r="11" fill="none" stroke="#7aa2ff" stroke-width="3"/>
              <text x="36" y="22" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#e7ecf3">Nimbus</text>
            </svg>

            <svg viewBox="0 0 110 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vertex">
              <path d="M6 6 L16 26 L26 6" fill="none" stroke="#ff8a5c" stroke-width="3" stroke-linejoin="round"/>
              <text x="34" y="22" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#e7ecf3">Vertex</text>
            </svg>

            <svg viewBox="0 0 120 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lumen">
              <rect x="6" y="6" width="20" height="20" rx="5" fill="#5cd1b0"/>
              <text x="34" y="22" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#e7ecf3">Lumen</text>
            </svg>

            <svg viewBox="0 0 120 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cobalt">
              <polygon points="16,4 28,16 16,28 4,16" fill="#146ef5"/>
              <text x="36" y="22" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#e7ecf3">Cobalt</text>
            </svg>

            <svg viewBox="0 0 120 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Quartz">
              <path d="M16 4 L26 11 V21 L16 28 L6 21 V11 Z" fill="none" stroke="#c79bff" stroke-width="3" stroke-linejoin="round"/>
              <text x="34" y="22" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#e7ecf3">Quartz</text>
            </svg>

            <svg viewBox="0 0 110 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Apex">
              <circle cx="16" cy="16" r="11" fill="#ffd166"/>
              <text x="34" y="22" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#e7ecf3">Apex</text>
            </svg>

            <!-- ↑↑↑ YOUR LOGOS GO HERE ↑↑↑ -->
          </div>
        </div>
      </div>
    </div>

    <!-- ============================================================
         Seamless-loop helper.
         The look + animation are 100% CSS. This tiny script only
         (1) clones your logos enough times to fill the strip, and
         (2) sets a duration so speed stays constant no matter how
             many logos you drop in. Pure CSS can't measure widths or
             clone DOM, so this ~15 lines is what makes "one slot,
             any number of logos" work seamlessly.
         ============================================================ -->
    <script>
      (function () {
        function setup(marquee) {
          var track = marquee.querySelector('.marquee__track');
          if (!track) return;

          // remember the logos exactly as authored (one "group")
          var group = Array.prototype.slice.call(track.children);
          if (!group.length) return;

          var speed = parseFloat(
            getComputedStyle(marquee).getPropertyValue('--marquee-speed')
          ) || 80;

          // width of a single group (logos + the gap that follows them)
          function groupWidth() {
            var styles = getComputedStyle(track);
            var gap = parseFloat(styles.columnGap || styles.gap) || 0;
            var w = 0;
            group.forEach(function (el) { w += el.getBoundingClientRect().width + gap; });
            return w;
          }

          var oneGroup = groupWidth();

          // clone the group until the track is at least 2x its own width
          // (covers the visible area + the off-screen copy that follows)
          var target = Math.max(marquee.offsetWidth * 2, oneGroup * 2);
          var safety = 0;
          while (track.scrollWidth < target && safety < 50) {
            group.forEach(function (el) {
              var clone = el.cloneNode(true);
              clone.setAttribute('aria-hidden', 'true');
              track.appendChild(clone);
            });
            safety++;
          }

          // one loop = exactly one group width  →  perfectly seamless
          track.style.setProperty('--shift', oneGroup + 'px');
          track.style.setProperty('--marquee-duration', oneGroup / speed + 's');
        }

        function init() {
          document.querySelectorAll('[data-marquee]').forEach(setup);
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init);
        } else {
          init();
        }
      })();
    </script>
  </body>
</html>
